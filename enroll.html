<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Step 2: Family & Social History</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; }
        textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn-save { background-color: #3498db; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>2. Family & Social History</h2>
    <p>Help us get to know your child better!</p>
    
    <form name="social-history" method="POST" data-netlify="true">
        <label>Has your child attended childcare before?</label>
        <select name="previous_care">
            <option value="no">No, this is the first time</option>
            <option value="yes">Yes</option>
        </select>

        <label>What comforts your child when they are upset?</label>
        <textarea name="comfort_methods" rows="3" placeholder="e.g. favorite toy, rocking, singing"></textarea>

        <label>Are there any specific fears (noises, animals, etc.)?</label>
        <textarea name="fears" rows="2"></textarea>

        <label>Developmental Goals</label>
        <textarea name="goals" rows="3" placeholder="e.g. Potty training, sharing, vocabulary"></textarea>

        <label>Family Traditions / Holidays</label>
        <textarea name="traditions" rows="2" placeholder="Anything special your family celebrates?"></textarea>

        <button type="submit" class="btn-save">Save & Continue</button>
    </form>
    <br>
    <a href="dashboard.html">← Back to Dashboard</a>
</div>

</body>
</html>
