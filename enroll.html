<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Inquiry - Child Care Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-4 md:p-8">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-blue-900 mb-2">Enrollment Inquiry</h1>
        <p class="text-gray-600 mb-6">Please fill out this form and I will contact you to discuss your child's care and our open spots.</p>

        <form action="https://formspree.io/f/mqakppov" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Parent/Guardian Name</label>
                <input type="text" name="name" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Phone Number</label>
                <input type="tel" name="phone" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Child's Name & Age</label>
                <input type="text" name="child_info" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Jordan, 2 years old">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">When do you need care to start?</label>
                <input type="date" name="start_date" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-600">
                <p class="text-sm text-blue-900 font-medium italic">"I am a Programs for Parents provider. Please mention in the notes if you are using assistance."</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Additional Notes (Special needs, allergies, etc.)</label>
                <textarea name="message" rows="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg transition duration-200">
                Submit Inquiry
            </button>
        </form>

        <div class="mt-8 text-center border-t pt-6">
            <a href="index.html" class="text-blue-600 font-medium hover:underline">← Back to Homepage</a>
        </div>
    </div>
</body>
</html>
