<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form #1</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #27ae60; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <form name="enrollment" method="POST" data-netlify="true">
        <h1>Child Enrollment</h1>
        <label>Child's Full Name</label><input type="text" name="child_name" required>
        <label>Date of Birth</label><input type="date" name="dob" required>
        <label>Family Structure</label><textarea name="family_history"></textarea>
        <label>Life Events</label><textarea name="life_events"></textarea>
        <button type="submit">Submit Item #1</button>
    </form>
</body>
</html>
